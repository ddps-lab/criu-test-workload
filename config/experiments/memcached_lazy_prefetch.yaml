# Memcached + YCSB lazy-prefetch experiment
experiment:
  name: "memcached-lazy-prefetch"
  workload_type: "memcached"
  description: "Memcached with lazy restore and async prefetch from object storage"

checkpoint:
  dirs:
    working_dir: "/tmp/criu_checkpoint"

  strategy:
    mode: "full"
    wait_before_dump: 90  # Wait 90s — covers dataproc r24M init (11 GB random gen) + YCSB load phase

transfer:
  method: "rsync"
  dest_dir: "/tmp/criu_checkpoint"

workload:
  memcached:
    port: 11211
    memory_mb: 1024
  ycsb:
    workload: "a"
    home: "/opt/ycsb"
    record_count: 100000
    threads: 1
    target_throughput: 0
  duration: 300
